[env]
TERM = "xterm-256color"

[window]
decorations = "None"
opacity = 1
startup_mode = "FullScreen"

[font]
#normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
#bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
#italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
#bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }

normal = { family = "ComicCode Nerd Font", style = "Regular" }
bold = { family = "ComicCode Nerd Font", style = "Bold" }
italic = { family = "ComicCode Nerd Font", style = "Italic" }
bold_italic = { family = "ComicCode Nerd Font", style = "Bold Italic" }
size = 20

[colors.primary]
background = '#1e1e1e'
foreground = '#ffffff'


[colors.selection]
background = '#eeeeec'
text = '#333333'

[mouse]
hide_when_typing = true
